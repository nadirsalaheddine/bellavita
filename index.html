<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bella Vita | Italian Summer Luxury</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">

    <header class="navbar">
        <div class="logo">
            <i class="fas fa-lemon lemon-icon"></i>
            <span>Bella<span class="brand-accent">Vita</span></span>
        </div>
        
        <nav class="nav-shelf">
            <a href="#hero" data-en="Home" data-fr="Accueil" data-it="Inizio">Home</a>
            <a href="#products-shelf" data-en="Products" data-fr="Produits" data-it="Prodotti">Products</a>
            <a href="#contact-shelf" data-en="Contact" data-fr="Contact" data-it="Contatto">Contact</a>
        </nav>

        <div class="nav-controls">
            <button id="theme-toggle" class="control-btn">
                <i class="fas fa-moon"></i>
            </button>
            
            <div class="lang-switcher">
                <span class="lang-opt active" onclick="switchLanguage('en')">EN</span>
                <span class="lang-opt" onclick="switchLanguage('fr')">FR</span>
                <span class="lang-opt" onclick="switchLanguage('it')">IT</span>
            </div>

            <div class="cart-icon-wrapper" onclick="toggleCart()">
                <i class="fas fa-shopping-basket basket-btn"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <section id="hero" class="hero-section">
        <div class="sun-glow"></div>
        <div class="hero-content">
            <span class="badge" data-en="Italian Luxury" data-fr="Luxe Italien" data-it="Lusso Italiano">Italian Luxury</span>
            <h1 class="hero-title">
                <span data-en="Sun-Kissed" data-fr="Produits" data-it="Baciata dal Sole">Sun-Kissed</span>
                <span class="gradient-text" data-en="Summer Glow" data-fr="Éclat d'Été" data-it="Splendore Estivo">Summer Glow</span>
            </h1>
            <p class="hero-desc" data-en="Experience the absolute radiance of Amalfi. Pure, rare, and high-speed beauty." data-fr="Découvrez l'éclat absolu d'Amalfi. Beauté pure, rare et rapide." data-it="Scopri l'assoluta radiosità di Amalfi. Bellezza pura, rara e veloce.">
                Experience the absolute radiance of Amalfi. Pure, rare, and high-speed beauty.
            </p>
            <a href="#products-shelf" class="cta-btn">
                <span data-en="Shop Now" data-fr="Acheter" data-it="Acquista Ora">Shop Now</span>
            </a>
        </div>
    </section>

    <section id="products-shelf" class="products-section">
        <div class="products-grid">
            <div class="product-card">
                <div class="img-box bg-lemon"><i class="fas fa-leaf"></i></div>
                <div class="prod-info">
                    <h3 data-en="Limone Cleanser" data-fr="Nettoyant Limone" data-it="Detergente al Limone">Limone Cleanser</h3>
                    <div class="prod-footer">
                        <span class="price">$25 / €23</span>
                        <button class="add-btn" onclick="addToCart('Limone Cleanser', 25, 23)"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>
            <div class="product-card">
                <div class="img-box bg-orange"><i class="fas fa-sun"></i></div>
                <div class="prod-info">
                    <h3 data-en="Bergamot Serum" data-fr="Sérum Bergamote" data-it="Siero al Bergamotto">Bergamot Serum</h3>
                    <div class="prod-footer">
                        <span class="price">$45 / €42</span>
                        <button class="add-btn" onclick="addToCart('Bergamot Serum', 45, 42)"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="side-cart" class="side-cart">
        <div class="cart-header">
            <h3 data-en="Basket" data-fr="Panier" data-it="Cestino">Basket</h3>
            <i class="fas fa-times close-cart" onclick="toggleCart()"></i>
        </div>
        <div id="cart-items" class="cart-items-list">
            </div>
        <div class="cart-footer">
            <div class="total-line">
                <span data-en="Total:" data-fr="Total :" data-it="Totale:">Total:</span>
                <span id="cart-total">$0 / €0</span>
            </div>
        </div>
    </div>

    <footer id="contact-shelf" class="footer">
        <p>© 2026 Bella Vita | Made by Nadir Salaheddine</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
